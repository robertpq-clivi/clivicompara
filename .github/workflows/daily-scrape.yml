name: Daily Wegovy Price Scraper

on:
  schedule:
    # Run daily at 09:00 UTC (03:00 CDT / 04:00 CST Mexico City)
    - cron: '0 9 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write  # Needed to push updated data/prices.json

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install playwright beautifulsoup4 requests lxml
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scrapers/wegovy_scraper.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet data/prices.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated prices
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git commit -m "chore: update Wegovy prices $(date +'%Y-%m-%d')"
          git push

      - name: Upload scraper logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: |
            data/prices.json
          retention-days: 30
